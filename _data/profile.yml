short_bio: >-
  <p>
    I am an Industrial PhD Researcher jointly affiliated with Technische Universität Berlin and Huawei Munich Research Center,
    advised by Prof. Stefan Schmid at TU Berlin and Dr. Yong Li at Huawei.
    My research focuses on <strong>AI security</strong>, <strong>privacy-preserving machine learning</strong>, and
    <strong>applied cryptography</strong>, with a particular interest in secure LLM inference, private retrieval-augmented generation,
    and runtime security for tool-using LLM agents.
  </p>
  <p>
    Before my Ph.D., I received an M.Sc. in Security and Mobile Computing from KTH Royal Institute of Technology and a B.Eng.
    in Information Engineering from Southeast University. I also worked on OpenHarmony security, static analysis, and code obfuscation
    at Huawei 2012 Labs, and completed my master thesis at Ericsson Stockholm.
  </p>

